server:
  port: 8084

spring:
  application:
    name: osm2-payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:osm2_payment}
    username: ${DB_USER:osm2_payment}
    password: ${DB_PASSWORD:osm2_payment}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: payment
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: payment
    create-schemas: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/osm2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  structured:
    format:
      console: logstash
  level:
    root: INFO
    dk.osm2: DEBUG

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  service:
    name: ${spring.application.name}

opendebt:
  audit:
    cls:
      enabled: false   # Set to true and configure endpoint in production via env/configmap

osm2:
  immudb:
    host: ${IMMUDB_HOST:localhost}
    port: ${IMMUDB_GRPC_PORT:3322}
    database: ${IMMUDB_DATABASE:defaultdb}
    username: ${IMMUDB_USER:immudb}
    password: ${IMMUDB_PASSWORD:immudb}

# OCES3 certificate parser — configures which DN field identifies the creditor system.
# For NemKonto and fordringssystem: the system identifier is typically in CN.
# Override with 'O' or a custom OID label if your OCES3 certificate encodes it differently.
oces3:
  dn-field: ${OCES3_DN_FIELD:CN}
