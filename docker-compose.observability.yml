# docker-compose.observability.yml — osm2 observability stack
# Services: OTel Collector, Tempo, Loki, Prometheus, Grafana, Promtail
# Usage: docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d

services:

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.101.0
    container_name: osm2-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics (self)

  tempo:
    image: grafana/tempo:2.5.0
    container_name: osm2-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query
      - "4317"        # OTLP gRPC (internal)

  loki:
    image: grafana/loki:3.1.0
    container_name: osm2-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki-data:/loki
    ports:
      - "3100:3100"   # Loki HTTP

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: osm2-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux compat (no-op on macOS/Windows)
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # Prometheus UI

  grafana:
    image: grafana/grafana:11.1.0
    container_name: osm2-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"   # Grafana UI
    depends_on:
      - prometheus
      - loki
      - tempo

  promtail:
    image: grafana/promtail:3.1.0
    container_name: osm2-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./config/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
