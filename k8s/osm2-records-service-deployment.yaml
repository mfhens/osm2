# k8s/osm2-records-service-deployment.yaml — [TODO] review before production deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osm2-records-service
  namespace: osm2
  labels:
    app: osm2-records-service
    app.kubernetes.io/part-of: osm2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: osm2-records-service
  template:
    metadata:
      labels:
        app: osm2-records-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: osm2-records-service
          image: ghcr.io/[TODO]/osm2-records-service:latest  # [TODO] pin to Git SHA tag
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector:4317
            - name: KEYCLOAK_ISSUER_URI
              value: http://keycloak:8080/realms/osm2
            # [TODO] Add DB_HOST, DB_NAME, DB_USER, DB_PASSWORD from Kubernetes Secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
