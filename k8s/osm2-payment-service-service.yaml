# k8s/osm2-payment-service-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: osm2-payment-service
  namespace: osm2
  labels:
    app: osm2-payment-service
spec:
  selector:
    app: osm2-payment-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
  type: ClusterIP
