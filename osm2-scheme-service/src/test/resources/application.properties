# Test runtime configuration for osm2-scheme-service Cucumber integration tests.
#
# Activates the "demo" profile so that KeycloakResourceServerAutoConfiguration
# registers the permissive SecurityFilterChain (anyRequest().permitAll()) instead
# of the JWT-secured chain.  This avoids the need for a running Keycloak in CI.
#
# Excludes the Spring Boot OAuth2 resource server auto-configuration to prevent
# it from attempting an eager OIDC metadata fetch against a non-existent Keycloak
# instance during the Spring context startup in TestContainers-backed integration tests.
spring.profiles.active=demo
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
