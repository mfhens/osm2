server:
  port: 8081

spring:
  application:
    name: osm2-scheme-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:osm2_scheme}
    username: ${DB_USER:osm2_scheme}
    password: ${DB_PASSWORD:osm2_scheme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: scheme
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: scheme
    create-schemas: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/osm2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1   # override in application-demo.yml
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  structured:
    format:
      console: logstash
  level:
    root: INFO
    dk.osm2: DEBUG


  audit:
    cls:
      enabled: false   # Set to true and configure endpoint in production via env/configmap