# ci.yml - osm2 GitHub Actions CI pipeline
# Triggers: push to any branch, pull_request to main
# Release: see release.yml (triggered by v*.*.* tag push)
#
# Tool versions are declared in .mise.toml at the repo root.
# jdx/mise-action reads that file and installs java, maven, and node
# at the exact pinned versions - no JAVA_VERSION env var needed here.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  # -------------------------------------------------
  # JOB: Validate (fast gate: format + C4 model)
  # -------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Check code formatting (Spotless)
        run: mvn --batch-mode spotless:check -pl audit-trail-commons,keycloak-oauth2-starter,oces3-certificate-parser,ufst-bookkeeping-core

      - name: Validate Maven project
        run: mvn --batch-mode validate

      - name: Validate C4 architecture model
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/architecture:/usr/local/structurizr \
            structurizr/cli validate --workspace workspace.dsl

  # -------------------------------------------------
  # JOB: Catala (formal oracle — ADR-0032; mirrors opendebt CI)
  # -------------------------------------------------
  catala-tests:
    name: Catala Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "4.14.2"

      - name: Install Catala 1.1.0
        run: opam install catala.1.1.0 -y

      - name: Typecheck Catala compliance files
        # catala typecheck accepts exactly one file per invocation.
        # --language en: treat surface syntax as English (--no-stdlib: no Stdlib_en dependency).
        run: |
          eval $(opam env)
          catala typecheck --language en --no-stdlib \
            osm2-scheme-service/src/main/catala/oss01.catala_da
          catala typecheck --language en --no-stdlib \
            osm2-scheme-service/src/main/catala/tests/test_oss01.catala_da
          catala typecheck --language en --no-stdlib \
            osm2-registration-service/src/main/catala/oss02.catala_da
          catala typecheck --language en --no-stdlib \
            osm2-registration-service/src/main/catala/tests/test_oss02.catala_da

      - name: Run Catala test scopes (interpret)
        run: |
          eval $(opam env)
          for scope in TestImportExcisable TestImportOver150 TestImportEligible150 \
                       TestNonEuServices TestEuSameCountryNoOss; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              osm2-scheme-service/src/main/catala/tests/test_oss01.catala_da
          done
          for scope in TestEarlyDeliveryApplies TestEarlyDeliveryNotApplies TestBindingEndYear; do
            catala interpret --language en --no-stdlib --scope "$scope" \
              osm2-registration-service/src/main/catala/tests/test_oss02.catala_da
          done

  # -------------------------------------------------
  # JOB: Build and verify
  # -------------------------------------------------
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: [validate, catala-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0  # Full history for SonarCloud blame data

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and verify (Spotless + JaCoCo + Surefire)
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-results
          path: "**/target/surefire-reports/*.xml"
          retention-days: 7

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/"
          retention-days: 7

  # -------------------------------------------------
  # JOB: Integration tests (Cucumber ITs + Keycloak)
  # -------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Start Keycloak
        run: |
          docker run -d --name keycloak \
            -p 8080:8080 \
            -e KEYCLOAK_ADMIN=admin \
            -e KEYCLOAK_ADMIN_PASSWORD=admin \
            -e KC_HEALTH_ENABLED=true \
            quay.io/keycloak/keycloak:24.0 start-dev

      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/ready > /dev/null 2>&1; then
              echo "Keycloak is ready"
              exit 0
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          echo "Keycloak failed to start"
          docker logs keycloak
          exit 1

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run integration tests
        run: mvn --batch-mode --no-transfer-progress verify -P integration-tests
        env:
          KEYCLOAK_ISSUER_URI: http://localhost:8080/realms/osm2

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: integration-test-results
          path: "**/target/failsafe-reports/*.xml"
          retention-days: 7

      - name: Stop Keycloak
        if: always()
        run: docker stop keycloak && docker rm keycloak

  # -------------------------------------------------
  # JOB: SonarCloud analysis
  # -------------------------------------------------
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.actor != 'dependabot[bot]'
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: SonarCloud Scan
        run: |
          mvn --batch-mode --no-transfer-progress verify sonar:sonar \
            -Dsonar.projectKey=mfhens_osm2 \
            -Dsonar.organization=mfhens \
            -Dsonar.host.url=https://sonarcloud.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -------------------------------------------------
  # JOB: OWASP Dependency Check
  # -------------------------------------------------
  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: OWASP Dependency Check (security-scan profile)
        run: mvn --batch-mode --no-transfer-progress verify -P security-scan -DskipTests
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: owasp-report
          path: "**/target/dependency-check-report.*"
          retention-days: 30

  # -------------------------------------------------
  # JOB: Dependency Review (PRs only)
  # -------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@da24e1d0a0919aff0e1a18913c48f22b88b24cfc  # v4
        with:
          fail-on-severity: high