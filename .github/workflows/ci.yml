# ci.yml - osm2 GitHub Actions CI pipeline
# Triggers: push to any branch, pull_request to main
# Release: on tag push matching v*.*.*
#
# Tool versions are declared in .mise.toml at the repo root.
# jdx/mise-action reads that file and installs java, maven, and node
# at the exact pinned versions - no JAVA_VERSION env var needed here.

name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  # -------------------------------------------------
  # JOB: Build and verify
  # -------------------------------------------------
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0  # Full history for SonarCloud blame data

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and verify (Spotless + JaCoCo + Surefire)
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-results
          path: "**/target/surefire-reports/*.xml"
          retention-days: 7

      - name: Upload JaCoCo coverage reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: jacoco-reports
          path: "**/target/site/jacoco/"
          retention-days: 7

  # -------------------------------------------------
  # JOB: SonarCloud analysis
  # -------------------------------------------------
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.actor != 'dependabot[bot]'
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: SonarCloud Scan
        run: |
          mvn --batch-mode --no-transfer-progress verify sonar:sonar \
            -Dsonar.projectKey=[TODO-SONAR-PROJECT-KEY] \
            -Dsonar.organization=[TODO-SONAR-ORG] \
            -Dsonar.host.url=https://sonarcloud.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -------------------------------------------------
  # JOB: OWASP Dependency Check
  # -------------------------------------------------
  owasp:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: OWASP Dependency Check (security-scan profile)
        run: mvn --batch-mode --no-transfer-progress verify -P security-scan -DskipTests
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: owasp-report
          path: "**/target/dependency-check-report.*"
          retention-days: 30

  # -------------------------------------------------
  # JOB: Dependency Review (PRs only)
  # -------------------------------------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@da24e1d0a0919aff0e1a18913c48f22b88b24cfc  # v4
        with:
          fail-on-severity: high

  # -------------------------------------------------
  # JOB: Release (on tag)
  # -------------------------------------------------
  release:
    name: Release & Docker Build
    runs-on: ubuntu-latest
    needs: [build, sonar, owasp]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Install tools (mise)
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache Maven repository
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set release version
        run: mvn --batch-mode versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build release artifacts
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Log in to container registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          IMAGE_TAG=${{ steps.version.outputs.VERSION }}
          SHA_TAG=${GITHUB_SHA::8}
          REGISTRY=ghcr.io/${{ github.repository_owner }}

          for module in osm2-scheme-service osm2-registration-service osm2-return-service osm2-payment-service osm2-records-service osm2-taxable-person-portal osm2-authority-portal; do
            IMAGE_NAME=${REGISTRY}/${module}
            docker build \
              --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
              --label "org.opencontainers.image.version=${IMAGE_TAG}" \
              -t ${IMAGE_NAME}:${IMAGE_TAG} \
              -t ${IMAGE_NAME}:${SHA_TAG} \
              ./${module}
            docker push ${IMAGE_NAME}:${IMAGE_TAG}
            docker push ${IMAGE_NAME}:${SHA_TAG}
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ steps.version.outputs.VERSION }} \
            --title "osm2 v${{ steps.version.outputs.VERSION }}" \
            --generate-notes