# docker-compose.structurizr.yml -- Structurizr Lite for local architecture diagram viewing
#
# Usage:
#   docker compose -f docker-compose.structurizr.yml up -d
#   open http://localhost:8978
#
# The ./architecture directory is mounted read-write so that edits made in the
# Structurizr browser UI are written back to workspace.dsl.
# ADRs and overview.md are also reachable under architecture/ from the same mount.

services:
  structurizr:
    image: structurizr/lite
    command: ["local"]
    container_name: osm2-structurizr
    restart: unless-stopped
    ports:
      - "8978:8080"
    volumes:
      - ./architecture:/usr/local/structurizr