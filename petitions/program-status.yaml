      - "Direktiv 2017/2455"
      - "Direktiv 2019/1995"
      - "Gennemførelsesforordning (EU) 2020/194 bilag III"
    notes: >
      Covers complete VAT return filing for all three OSS schemes (Non-EU, EU, Import).
      Highest-complexity path: correction window / final-return intersection across three
      temporal boundaries. ECB-rate-at-period-end rule (not payment date) is FR-3.2/FR-3.3.
      Out of scope: payment processing (OSS-05), record-keeping (OSS-06).

