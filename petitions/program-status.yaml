# Program Status — osm2
# Managed by: backlog-planner, sprint-tracker
# Do not edit manually unless correcting a tracking error.
# Fields:
#   petitions: list of petition delivery records (populated by backlog-planner)
#   legal_footprint: true if the petition encodes statute-backed rules (Catala-eligible per catala-encoder Phase 1)
#   catala_files: optional paths to .catala_da oracle sources and tests (catala-encoder)
#   phase: integer delivery wave (backlog-planner); aligns with phases[] below
#   depends_on: petition IDs that must complete before this petition starts (backlog-planner)
#   next_step: steering / SteerCo — concrete next action while not done (steerco-presentation)
#   technical_backlog: list of TB-* technical backlog items (populated by tech-debt-executor)
#   phases: phase definitions — petition lists and SteerCo delivery-progress tables
#   critical_path: ordered backbone petition IDs for program success (steerco-presentation)
#   escalations: open blockers raised by agents (see AGENTS.md / pipeline agents)

schema_version: 1

program: osm2
last_updated: "2026-04-03"

# Delivery phases (SteerCo + backlog-planner). Petition may appear in exactly one phase.
phases:
  - id: phase-1
    name: "Foundation — scheme classification"
    objective: Establish OSS scheme eligibility and shared definitions for all downstream work.
    petitions:
      - OSS-01

  - id: phase-2
    name: "Registration — Non-EU, EU, and Import"
    objective: Complete registration lifecycles for all three OSS schemes.
    petitions:
      - OSS-02
      - OSS-03

  - id: phase-3
    name: "VAT returns and corrections"
    objective: Return filing and correction windows across schemes.
    petitions:
      - OSS-04

  - id: phase-4
    name: "Payment and recovery"
    objective: Payments, refunds, reminders, joint liability coordination.
    petitions:
      - OSS-05

  - id: phase-5
    name: "Records and retention"
    objective: Statutory record-keeping and accessibility.
    petitions:
      - OSS-06

# End-to-end backbone (steerco-presentation critical-path slide). Parallel work still uses depends_on.
critical_path:
  - OSS-01
  - OSS-02
  - OSS-03
  - OSS-04
  - OSS-05
  - OSS-06

