      - "Momssystemdirektivet artikler 369, 369k, 369x"
      - "Momsforordningen artikel 63c"
      - "Gennemførelsesforordning (EU) 2019/2026"
    notes: >
      Covers 10-year statutory record retention with immediate per-item electronic accessibility.
      Dual-access model: identification member state (full) and each consumption member state
      (scoped). Records remain accessible post-deregistration. Hot-storage constraint (no cold
      archive within retention window) has significant infrastructure implications for OSS-02/03/04
      data models. Depends on all preceding petitions.

