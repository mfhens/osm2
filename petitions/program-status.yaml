      - "Momsforordningen artikler 62–63b"
      - "Gennemførelsesforordning (EU) 2019/2026"
    notes: >
      Covers payment processing, overpayment refunds, ECB-rate-at-period-end enforcement,
      day-10 late-payment reminders, consumption-state coordination, and Import scheme joint
      liability. ECB rate (last day of period, not payment date) is the highest-risk
      implementation error — explicitly tested in SC-08 and SC-09. Depends on OSS-04.

  - id: OSS-06
    title: "Regnskab og dokumentation"
    status: draft
    created: "2026-03-30"
    artifacts:
