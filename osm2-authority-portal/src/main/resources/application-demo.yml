# Demo profile — portals have no database, but demo mode relaxes CSRF for local testing
# and switches the OIDC provider to the local Keycloak with demo users.
spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: osm2-authority-portal
            client-secret: demo-secret-authority
            scope: openid,profile,email

logging:
  level:
    dk.osm2: DEBUG
    org.springframework.security: DEBUG

management:
  tracing:
    sampling:
      probability: 1.0  # 100% trace sampling in demo
