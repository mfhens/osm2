server:
  port: 8091

spring:
  application:
    name: osm2-authority-portal
  thymeleaf:
    cache: false
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${OIDC_CLIENT_ID:osm2-authority-portal}
            client-secret: ${OIDC_CLIENT_SECRET:[TODO]}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            authorization-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/osm2}/protocol/openid-connect/auth
            token-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/osm2}/protocol/openid-connect/token
            jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/osm2}/protocol/openid-connect/certs
            user-info-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/osm2}/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 0.1   # override in application-demo.yml
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  structured:
    format:
      console: logstash
  level:
    root: INFO
    dk.osm2: DEBUG

osm2:
  services:
    scheme-service:
      base-url: ${SCHEME_SERVICE_URL:http://localhost:8081}
    registration-service:
      base-url: ${REGISTRATION_SERVICE_URL:http://localhost:8082}
    return-service:
      base-url: ${RETURN_SERVICE_URL:http://localhost:8083}
    payment-service:
      base-url: ${PAYMENT_SERVICE_URL:http://localhost:8084}
    records-service:
      base-url: ${RECORDS_SERVICE_URL:http://localhost:8085}

resilience4j:
  circuitbreaker:
    instances:
      registrationService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      registrationService:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
