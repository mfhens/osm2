# mkdocs.yml - osm2 documentation site
# Usage: mkdocs serve (local) | mkdocs build (static site)
# Theme: Material for MkDocs (pip install mkdocs-material)
#
# docs_dir is the project root so that architecture/ and docs/ can both be
# served.  All nav paths are relative to the project root.

site_name: "osm2 -- One Stop Moms 2"
site_description: "Danish VAT One Stop Shop Administration System -- Technical Documentation"
site_author: "Skatteforvaltningen / [TODO: organisation name]"
docs_dir: .
site_dir: site
exclude_docs: |
  target/
  node_modules/
  .mise.toml
  .github/
  *.xml
  *.java
  *.sql
  *.yaml
  !mkdocs.yml

theme:
  name: material
  language: da
  palette:
    - scheme: default
      primary: indigo
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - search.highlight
    - content.code.copy

nav:
  - Home: docs/index.md
  - Architecture:
    - Overview: architecture/overview.md
    - Architecture Decision Records:
      - "0001 -- Architecture Principles": architecture/adr/0001-architecture-principles.md
      - "0002 -- Microservices": architecture/adr/0002-microservices-architecture.md
      - "0004 -- API-First OpenAPI 3.1": architecture/adr/0004-api-first-openapi.md
      - "0005 -- Keycloak OIDC": architecture/adr/0005-keycloak-oidc-auth.md
      - "0006 -- Kubernetes": architecture/adr/0006-kubernetes-deployment.md
      - "0007 -- No Cross-Service DB": architecture/adr/0007-no-cross-service-db-access.md
      - "0011 -- PostgreSQL": architecture/adr/0011-postgresql-database.md
      - "0013 -- Audit & History": architecture/adr/0013-audit-history.md
      - "0014 -- GDPR PII Isolation": architecture/adr/0014-gdpr-registration-service-pii-silo.md
      - "0018 -- Double-Entry Bookkeeping": architecture/adr/0018-double-entry-bookkeeping.md
      - "0019 -- Orchestration over Events": architecture/adr/0019-orchestration-over-events.md
      - "0023 -- SKAT Design System": architecture/adr/0023-skat-design-system.md
      - "0024 -- OTel + Grafana": architecture/adr/0024-otel-grafana-observability.md
      - "0025 -- Maven": architecture/adr/0025-maven-build-tool.md
      - "0026 -- Resilience4j": architecture/adr/0026-resilience4j-circuit-breaker.md
      - "0029 -- immudb Ledger": architecture/adr/0029-immudb-tamper-evident-ledger.md
      - "0031 -- Statutory Enums": architecture/adr/0031-statutory-codes-as-enums.md
      - "0032 -- Catala Oracle (CI)": architecture/adr/0032-catala-oracle-only.md
      - "0033 -- Bitemporal Registration": architecture/adr/0033-bitemporal-registration.md
      - "0034 -- OCES3 mTLS Payment": architecture/adr/0034-oces3-mtls-payment-service.md
  - Petitions:
    - "OSS-01 -- Scheme Eligibility": petitions/OSS-01/OSS-01.md
    - "OSS-02 -- Registration": petitions/OSS-02/OSS-02.md
    - "OSS-03 -- Deregistration": petitions/OSS-03/OSS-03.md
    - "OSS-04 -- VAT Returns": petitions/OSS-04/OSS-04.md
    - "OSS-05 -- Payments": petitions/OSS-05/petition.md
    - "OSS-06 -- Records": petitions/OSS-06/OSS-06.md
  - References:
    - "DA16 -- Moms One Stop Shop": docs/references/DA16-moms-one-stop-shop.md
  - Engineering:
    - "Cross-repo learnings (osm2 / opendebt)": docs/engineering/cross-repo-learnings.md
  - Integrations:
    - "Basecamp": docs/integrations/basecamp/README.md
  - Compliance:
    - "GDPR Register": compliance/gdpr-register.csv

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed

plugins:
  - search