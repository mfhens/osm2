# Promtail — discovers osm2 Docker container logs via Docker socket and ships to Loki.
# docker-compose.observability.yml mounts /var/run/docker.sock:/var/run/docker.sock:ro
# Only containers whose names start with "osm2-" are ingested.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only osm2-* containers
      - source_labels: [__meta_docker_container_name]
        regex: /osm2-.*
        action: keep
      # Strip leading slash from container name
      - source_labels: [__meta_docker_container_name]
        regex: /(.+)
        target_label: container
      # Use compose service name as "service" label
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
    pipeline_stages:
      # Parse Logstash JSON emitted by logstash-logback-encoder
      - json:
          expressions:
            level: level
            logger: logger_name
            message: message
            traceId: mdc.traceId
            spanId:  mdc.spanId
      - labels:
          level:
          logger:
      - output:
          source: message
