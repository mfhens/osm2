# Prometheus — scrapes /actuator/prometheus from all osm2 services running on the host.
# host.docker.internal resolves on Windows/macOS Docker Desktop.
# On Linux add "extra_hosts: [host.docker.internal:host-gateway]" to the prometheus service
# in docker-compose.observability.yml (already present).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: osm2-scheme-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: osm2-scheme-service

  - job_name: osm2-registration-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: osm2-registration-service

  - job_name: osm2-return-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          service: osm2-return-service

  - job_name: osm2-payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          service: osm2-payment-service

  - job_name: osm2-records-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8085']
        labels:
          service: osm2-records-service

  - job_name: osm2-taxable-person-portal
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8090']
        labels:
          service: osm2-taxable-person-portal

  - job_name: osm2-authority-portal
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8091']
        labels:
          service: osm2-authority-portal
